<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Vantoro V12 supercar</title>
  <desc id="desc">A red V12 supercar shown from the rear on a dramatic night road.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#090b18"/><stop offset=".56" stop-color="#2a2947"/><stop offset="1" stop-color="#9c6078"/></linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#262a33"/><stop offset="1" stop-color="#07080d"/></linearGradient>
    <linearGradient id="body" x1=".12" y1=".03" x2=".9" y2=".95"><stop stop-color="#ff6c75"/><stop offset=".28" stop-color="#c8213a"/><stop offset=".7" stop-color="#6f0b1e"/><stop offset="1" stop-color="#21020a"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#b7ddec"/><stop offset=".32" stop-color="#3d4d62"/><stop offset="1" stop-color="#05070e"/></linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="11" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
