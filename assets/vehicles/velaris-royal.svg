<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Velaris Royal luxury SUV</title>
  <desc id="desc">A deep blue luxury SUV shown from the rear on a dramatic mountain road.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#04111c"/><stop offset=".6" stop-color="#203a50"/><stop offset="1" stop-color="#826f85"/></linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#26323d"/><stop offset="1" stop-color="#070c11"/></linearGradient>
    <linearGradient id="body" x1=".12" y1=".02" x2=".9" y2=".95"><stop stop-color="#607d94"/><stop offset=".28" stop-color="#29475d"/><stop offset=".68" stop-color="#102537"/><stop offset="1" stop-color="#050b11"/></linearGradient>
