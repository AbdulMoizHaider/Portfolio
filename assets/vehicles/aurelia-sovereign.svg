<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Aurelia Sovereign luxury sedan</title>
  <desc id="desc">A pearl white flagship sedan shown from the rear on a dramatic night road.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#071321"/><stop offset=".58" stop-color="#263b55"/><stop offset="1" stop-color="#9b7990"/></linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#202b35"/><stop offset="1" stop-color="#080d13"/></linearGradient>
    <linearGradient id="body" x1=".16" y1=".05" x2=".9" y2=".95"><stop stop-color="#ffffff"/><stop offset=".32" stop-color="#e8e4db"/><stop offset=".7" stop-color="#8b9199"/><stop offset="1" stop-color="#252c34"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#b9ddec"/><stop offset=".35" stop-color="#435d73"/><stop offset="1" stop-color="#07101a"/></linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#f4f7f8"/><stop offset=".5" stop-color="#7f8a93"/><stop offset="1" stop-color="#1f272f"/></linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1280" height="800" fill="url(#sky)"/>
  <circle cx="950" cy="168" r="48" fill="#fff6dd" opacity=".9" filter="url(#glow)"/>
  <path d="M0 310L170 196l118 91 150-138 171 155 150-125 164 123 139-93 218 110v90H0z" fill="#12283b" opacity=".9"/>
  <path d="M0 394L410 306h460l410 88v406H0z" fill="url(#road)"/>
  <path d="M565 324h150l310 476H255z" fill="#202a34" opacity=".84"/>
  <path d="M628 350h24l26 450h-76z" fill="#ecf0ef" opacity=".68"/>
  <ellipse cx="640" cy="678" rx="360" ry="66" fill="#000" opacity=".62" filter="url(#blur)"/>
  <g>
    <rect x="278" y="477" width="78" height="190" rx="28" fill="#050607"/><rect x="924" y="477" width="78" height="190" rx="28" fill="#050607"/>
    <path d="M292 614l18-204 108-150 113-62h218l113 62 108 150 18 204-54 77H346z" fill="url(#body)" stroke="#fff" stroke-opacity=".3" stroke-width="5"/>
    <path d="M444 281l76-64h240l76 64 54 129H390z" fill="url(#glass)"/>
    <path d="M469 286l58-48h34l62 172H408z" fill="#d7eef7" opacity=".22"/>
