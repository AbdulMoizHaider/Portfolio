  <text x="70" y="98" fill="#fff" font-family="Arial, sans-serif" font-size="29" font-weight="700" letter-spacing="7">AURORA RUSH</text>
  <text x="70" y="137" fill="#b6c6d5" font-family="Arial, sans-serif" font-size="19" letter-spacing="4">AURELIA SOVEREIGN</text>
