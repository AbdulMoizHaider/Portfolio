    <rect x="598" y="464" width="84" height="74" rx="16" fill="#646b72"/>
    <text x="640" y="583" text-anchor="middle" fill="#f8fafb" font-size="35" font-family="Arial, sans-serif" font-weight="800" letter-spacing="9">AURELIA</text>
    <rect x="362" y="628" width="556" height="52" rx="18" fill="url(#chrome)"/>
    <rect x="552" y="603" width="176" height="70" rx="15" fill="#0b1219" stroke="#d9e0e5" stroke-opacity=".5"/>
    <text x="640" y="647" text-anchor="middle" fill="#f7fafb" font-size="27" font-family="Arial, sans-serif" font-weight="700">AMH LUX</text>
